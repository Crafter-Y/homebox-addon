---
name: Release

on:
  push:
    branches:
      - master
    paths:
      - homebox/config.yaml
      - homebox/CHANGELOG.md

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: homebox

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gather release metadata
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          VERSION="$(grep -oP '^version: "\K[^"]+' homebox/config.yaml)"
          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" -- \
              homebox/config.yaml \
              homebox/CHANGELOG.md
          )"
          if [ -z "${changed_files}" ]; then
            echo "No release-related changes detected; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk -v version="${VERSION}" '
            $0 == "## " version { found=1; next }
            found && /^## / { exit }
            found { print }
          ' homebox/CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

          {
            echo "should_release=true"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes-file /tmp/release-notes.md

  init:
    name: Initialize build
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase registry prefix
        id: registry
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ steps.registry.outputs.prefix }}

  build:
    name: Build and push ${{ matrix.arch }} image
    needs: [release, init]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Get base image for architecture
        id: base
        run: |
          BUILD_FROM=$(yq '.build_from."${{ matrix.arch }}"' homebox/build.yaml)
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: homebox
          cosign: "false"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.release.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.release.outputs.version }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.build_from }}
            BUILD_NAME=Homebox
            BUILD_DESCRIPTION=Inventory management — track and manage your belongings
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
